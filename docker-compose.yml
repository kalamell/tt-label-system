services:
  app:
    build: .
    ports:
      - "8080:8000"
    environment:
      APP_NAME: "TikTok Label System"
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: http://localhost:8080
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: tiktok_label
      DB_USERNAME: tiktok
      DB_PASSWORD: secret123
      SESSION_DRIVER: file
      CACHE_STORE: file
      QUEUE_CONNECTION: sync
      FILESYSTEM_DISK: local
    volumes:
      - ./public/uploads:/var/www/app/public/uploads
      - ./public/labels:/var/www/app/public/labels
      - ./scripts:/var/www/app/scripts
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: tiktok_label
      MYSQL_USER: tiktok
      MYSQL_PASSWORD: secret123
      MYSQL_ROOT_PASSWORD: root123
    ports:
      - "3307:3306"
    volumes:
      - ./docker/mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "tiktok", "-psecret123"]
      interval: 5s
      timeout: 10s
      retries: 20
    restart: unless-stopped

  phpmyadmin:
    image: phpmyadmin:latest
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: root123
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

